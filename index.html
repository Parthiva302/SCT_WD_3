<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tic Tac Toe — Neon Dark</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1 class="title">Tic Tac Toe</h1>
        <div class="controls">
            <div class="modes">
              <button id="mode-ai" class="mode-btn active">Vs Computer</button>
              <button id="mode-pvp" class="mode-btn">Vs Player</button>
            </div>
            <div class="extras">
              <button id="theme-toggle" class="btn">Monochrome</button>
              <button id="restart" class="btn neon">Restart</button>
            </div>
        </div>
      </header>

      <section class="board-area">
        <div id="status" class="status">X's turn</div>
        <div id="board" class="board" role="grid" aria-label="Tic Tac Toe board">
          <!-- 9 cells inserted by JS -->
        </div>
      </section>

      <footer class="footer">
        <p class="credits">Made with <span class="heart">♥</span></p>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
